<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Letters — balloons</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    cursor: text;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle hint that fades on first keystroke */
  #hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255, 255, 255, 0.18);
    font-size: 15px;
    letter-spacing: 0.08em;
    font-weight: 300;
    pointer-events: none;
    user-select: none;
    transition: opacity 0.8s ease;
  }

  .letter {
    position: fixed;
    font-weight: 700;
    pointer-events: none;
    user-select: none;
    will-change: transform, opacity;
    line-height: 1;
  }

  #clear {
    position: fixed;
    bottom: 22px;
    right: 24px;
    z-index: 10;
    padding: 9px 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: rgba(255, 255, 255, 0.55);
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: color 0.25s ease, background 0.25s ease,
                border-color 0.25s ease, transform 0.15s ease;
  }
  #clear:hover {
    color: rgba(255, 255, 255, 0.9);
    background: rgba(255, 255, 255, 0.09);
    border-color: rgba(255, 255, 255, 0.3);
  }
  #clear:active { transform: scale(0.95); }
</style>
</head>
<body>
  <div id="hint">start typing anywhere…</div>
  <button id="clear" aria-label="Release all letters">clear</button>

  <script>
    const root = document.body;
    const hint = document.getElementById('hint');
    const clearBtn = document.getElementById('clear');
    let hintGone = false;

    const fontSize = 44;
    const PAD_X = 28;     // side margin for the packed grid
    const PAD_TOP = 26;   // ceiling margin

    // Virtual cursor — letters appear here, advancing as you type.
    let cursor = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let lineStartX = cursor.x;

    // All live balloons, plus a slot counter that resets on clear.
    const balloons = [];
    let placedCount = 0;

    window.addEventListener('mousemove', (e) => {
      cursor.x = e.clientX;
      cursor.y = e.clientY;
      lineStartX = e.clientX;
    });

    window.addEventListener('mousedown', (e) => {
      if (e.target === clearBtn) return; // don't reposition cursor on the button
      cursor.x = e.clientX;
      cursor.y = e.clientY;
      lineStartX = e.clientX;
    });

    function dismissHint() {
      if (hintGone) return;
      hintGone = true;
      hint.style.opacity = '0';
      setTimeout(() => hint.remove(), 900);
    }

    function vibrantColor() {
      const hue = Math.floor(Math.random() * 360);
      const sat = 75 + Math.random() * 20;
      const light = 58 + Math.random() * 14;
      return `hsl(${hue}, ${sat}%, ${light}%)`;
    }

    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
    const easeInCubic  = (t) => t * t * t;
    const lerp = (a, b, t) => a + (b - a) * t;

    // Where balloon #i settles: packed left-to-right, wrapping into rows
    // that grow downward from the ceiling, so they crowd at the top.
    function slotFor(i) {
      const slotW = fontSize * 0.92;
      const slotH = fontSize * 1.12;
      const perRow = Math.max(1, Math.floor((window.innerWidth - PAD_X * 2) / slotW));
      const row = Math.floor(i / perRow);
      const col = i % perRow;
      return {
        x: PAD_X + col * slotW + slotW / 2,
        y: PAD_TOP + row * slotH + slotH / 2,
      };
    }

    function spawnLetter(char) {
      const el = document.createElement('span');
      el.className = 'letter';
      el.textContent = char;

      const color = vibrantColor();
      const size = fontSize * (0.85 + Math.random() * 0.35);
      el.style.fontSize = size + 'px';
      el.style.color = color;
      el.style.textShadow = `0 0 18px ${color}66, 0 0 4px ${color}44`;
      root.appendChild(el);

      const slot = slotFor(placedCount++);

      const b = {
        el,
        size,
        startX: cursor.x,
        startY: cursor.y,
        targetX: slot.x + (Math.random() * 10 - 5),
        targetY: slot.y + (Math.random() * 8 - 4),
        bornAt: performance.now(),
        riseDur: 1200 + Math.random() * 800,
        baseRot: Math.random() * 22 - 11,
        swayPhase: Math.random() * Math.PI * 2,
        swayAmp: 2.5 + Math.random() * 3.5,
        bobAmp: 2.5 + Math.random() * 3.5,
        curX: cursor.x,
        curY: cursor.y,
        state: 'rising',
      };
      balloons.push(b);

      // advance the virtual cursor for the next character
      cursor.x += size * 0.62;
      if (cursor.x > window.innerWidth - 40) {
        cursor.x = lineStartX;
        cursor.y += fontSize * 1.3;
        if (cursor.y > window.innerHeight - 60) cursor.y = window.innerHeight / 2;
      }
    }

    function place(b, x, y, rot, opacity, scale) {
      b.curX = x;
      b.curY = y;
      b.el.style.transform =
        `translate(${x}px, ${y}px) translate(-50%, -50%) rotate(${rot}deg) scale(${scale})`;
      b.el.style.opacity = opacity;
    }

    function tick(now) {
      for (let i = balloons.length - 1; i >= 0; i--) {
        const b = balloons[i];

        if (b.state === 'rising') {
          const t = Math.min((now - b.bornAt) / b.riseDur, 1);
          const e = easeOutCubic(t);
          const x = lerp(b.startX, b.targetX, e);
          const y = lerp(b.startY, b.targetY, e);
          const rot = b.baseRot * (0.4 + 0.6 * e);
          place(b, x, y, rot, 1, lerp(0.7, 1, e));
          if (t >= 1) { b.state = 'settled'; b.settledAt = now; }

        } else if (b.state === 'settled') {
          const tt = (now - b.settledAt) / 1000;
          const x = b.targetX + Math.sin(tt * 0.9 + b.swayPhase) * b.swayAmp;
          const y = b.targetY + Math.sin(tt * 1.3 + b.swayPhase) * b.bobAmp;
          const rot = b.baseRot + Math.sin(tt * 0.8 + b.swayPhase) * 3.5;
          place(b, x, y, rot, 1, 1);

        } else if (b.state === 'releasing') {
          const t = Math.min(Math.max((now - b.releaseAt) / b.releaseDur, 0), 1);
          const e = easeInCubic(t);
          const x = lerp(b.relStartX, b.relStartX + b.relDrift, e);
          const y = lerp(b.relStartY, -160, e);
          const rot = b.baseRot + Math.sin(t * 6 + b.swayPhase) * 8;
          const opacity = t < 0.55 ? 1 : 1 - (t - 0.55) / 0.45;
          place(b, x, y, rot, Math.max(opacity, 0), lerp(1, 1.15, e));
          if (t >= 1) {
            b.el.remove();
            balloons.splice(i, 1);
          }
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // "Release" everything: balloons float up off the ceiling and away.
    clearBtn.addEventListener('click', () => {
      const now = performance.now();
      let n = 0;
      balloons.forEach((b) => {
        if (b.state === 'releasing') return;
        b.state = 'releasing';
        b.releaseAt = now + n * 18;            // gentle staggered release
        b.releaseDur = 1300 + Math.random() * 900;
        b.relStartX = b.curX;
        b.relStartY = b.curY;
        b.relDrift = Math.random() * 120 - 60;
        n++;
      });
      placedCount = 0;
      cursor.x = window.innerWidth / 2;
      cursor.y = window.innerHeight / 2;
      lineStartX = cursor.x;
      clearBtn.blur();
    });

    window.addEventListener('keydown', (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      if (e.key === 'Enter') {
        e.preventDefault();
        dismissHint();
        cursor.x = lineStartX;
        cursor.y += fontSize * 1.4;
        if (cursor.y > window.innerHeight - 60) cursor.y = window.innerHeight / 2;
        return;
      }

      if (e.key === 'Backspace') { e.preventDefault(); return; }

      if (e.key.length === 1) {
        e.preventDefault();
        dismissHint();
        if (e.key === ' ') {
          cursor.x += fontSize * 0.5;
          if (cursor.x > window.innerWidth - 40) {
            cursor.x = lineStartX;
            cursor.y += fontSize * 1.3;
          }
        } else {
          spawnLetter(e.key);
        }
      }
    });

    window.addEventListener('resize', () => {
      cursor.x = Math.min(cursor.x, window.innerWidth - 40);
      cursor.y = Math.min(cursor.y, window.innerHeight - 40);
    });
  </script>
</body>
</html>
